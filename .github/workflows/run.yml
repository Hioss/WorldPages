name: run-hot-spider-gradle

permissions:
  contents: write
  
on:
  schedule:
    - cron: "2 0 * * *"   # 日本时间（有延迟） 11:00
  workflow_dispatch:

jobs:
  run-spider:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Run spider
        run: ./gradlew run

      # 提交到当前 WorldPages 仓库
      - name: Commit generated data (WorldPages)
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/data
          if git diff --cached --quiet; then
            echo "No changes"
          else
            TS="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')"
            git commit -m "${TS} - NewsPage新闻数据更新 by Bot"
            git push origin main
          fi

      # 同步到 Cloudflare 仓库
      - name: Sync data to Cloudflare repo
        shell: bash
        env:
          TOKEN: ${{ secrets.PUSH_CLOUDFLARE_TOKEN }}
        run: |
          set -e
          echo "Cloning Cloudflare repo..."
          git clone https://x-access-token:${TOKEN}@github.com/Hioss/Cloudflare.git cloudflare-repo
            
          echo "Copying json data to Cloudflare/public/data ..."
          # 先清空目标目录，才能同步“删除”
          rm -f cloudflare-repo/public/data/NewsPage-*.json
          rm -f cloudflare-repo/public/data/date.json
          
          # 再复制当前最新的数据（包含 date.json）
          cp -rf docs/data/*.json cloudflare-repo/public/data/
            
          cd cloudflare-repo
            
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add -A public/data
          if git diff --cached --quiet; then
            echo "No changes in Cloudflare repo"
          else
            TS="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')"
            git commit -m "${TS} - NewsPage新闻数据同步 by Bot"
            git push origin main
          fi
